version: '3.8'

services:
  mock-api:
    build:
      context: ./server
      dockerfile: backend.Dockerfile
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
    volumes:
      - ./server:/app
      - /app/node_modules

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - mock-api
    environment:
      - BACKEND_URL=http://mock-api:4000
    volumes:
      - .:/app
      - /app/node_modules

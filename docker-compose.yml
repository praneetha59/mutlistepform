version: '3.8'

services:
  mock-api:
    build:
      context: ./server
      dockerfile: backend.Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
    volumes:
      - ./server:/app
      - /app/node_modules

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - mock-api
    environment:
      - BACKEND_URL=http://mock-api:5000
    volumes:
      - .:/app
      - /app/node_modules
